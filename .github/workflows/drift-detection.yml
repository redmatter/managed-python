name: Architecture Drift Detection

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
    branches:
      - develop
  issue_comment:
    types: [created]

jobs:
  drift-detection:
    if: |
      (github.event_name == 'pull_request' && contains(fromJSON('["opened", "reopened", "ready_for_review", "synchronize"]'), github.event.action)) ||
      (github.event_name == 'issue_comment' && (
        contains(github.event.comment.body, '@claude') ||
        contains(github.event.comment.body, '/arch-approve') ||
        contains(github.event.comment.body, '/arch-ignore')
      ) && github.event.issue.pull_request != null)
    uses: redmatter/github-workflows/.github/workflows/drift-detection.yml@v1
    secrets:
      CLAUDE_API_KEY_DRIFT_DETECTION: ${{ secrets.CLAUDE_API_KEY_DRIFT_DETECTION }}
      GH_SSH_KEY: ${{ secrets.GH_SSH_KEY }}
